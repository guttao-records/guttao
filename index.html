<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Guttao</title>
  <style>
    .corda-frame {
      display: inline-block;
      padding: 20px;
      border: 30px solid transparent;
      border-image: url('corda.png') 30 round; /* moldura da corda */
      border-radius: 50%; /* deixa a moldura circular */
    }
    .corda-frame img {
      width: 200px;        /* tamanho da foto */
      height: 200px;       /* altura igual à largura */
      border-radius: 50%;  /* transforma em círculo */
      object-fit: cover;   /* preenche sem distorcer */
      object-position: center; /* centraliza o rosto */
      display: block;
    }
  </style>
</head>
<body>
  <div class="corda-frame">
    <img src="https://imgur.com/QLgvTsC.png" alt="Foto circular do Guttao">
  </div>
</body>
