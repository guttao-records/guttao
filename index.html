<!DOCTYPE html>

  <meta charset="UTF-8">
  <title>Guttao</title>
  <style>
    .corda-frame {
      display: inline-block;
      padding: 20px;
      border: 30px solid transparent;
      border-image: url('corda.png') 30 round; /* moldura da corda */
      border-radius: 50%; /* deixa a moldura circular */
    }
    .corda-frame img {
      width: 200px;        /* tamanho da foto */
      height: 200px;       /* altura igual à largura */
      border-radius: 50%;  /* transforma em círculo */
      object-fit: cover;   /* preenche sem distorcer */
      object-position: center; /* centraliza o rosto */
      display: block;
    }
  </style>
</head>
<body>
  <div class="corda-frame">
    <img src="https://imgur.com/QLgvTsC.png" alt="Foto circular do Guttao">
  </div>
</body>

    .card {

      border-radius: 12px;
      padding: 20px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 4px 12px rgba(192,192,192,0.2);

    .card:hover { transform: translateY(-4px); }

    h1 {
      font-size: 2.8em;

      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      width: 80%;
      max-width: 300px;
      transition: background 0.3s;
    }
    a.button:hover { background-color: #A9A9A9; }

    /* Player de música */
    .music-player {
      background-color: #111;
      border-radius: 12px;
      padding: 20px;
      margin: 30px auto;
      max-width: 600px;
      text-align: center;

    .btn-single {

      font-weight: bold;
