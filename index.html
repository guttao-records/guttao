<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Guttao</title>
  <style>
    .corda-frame {
      display: inline-block;
      padding: 20px;
      border: 30px solid transparent;
      border-image: url('corda.png') 30 round; /* moldura da corda */
      border-radius: 50%; /* deixa a moldura circular */
    }
    .corda-frame img {
      width: 200px;        /* tamanho da foto */
      height: 200px;       /* altura igual à largura */
      border-radius: 50%;  /* transforma em círculo */
      object-fit: cover;   /* preenche sem distorcer */
      object-position: center; /* centraliza o rosto */
      display: block;
    }
  </style>
</head>
<body>

    body {
      margin: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #000;
      color: #C0C0C0;
      text-align: center;
      padding: 40px 20px;
    }

    header .logo {
      width: 80px;
      margin-bottom: 20px;
    }

    .card {
      background-color: #000;
      border: 1px solid #C0C0C0;
      border-radius: 12px;
      padding: 20px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 4px 12px rgba(192,192,192,0.2);
      transition: transform 0.3s ease;
    }
    .card:hover { transform: translateY(-4px); }

    h1 {
      font-size: 2.8em;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .tagline {
      font-size: 1.4em;
      font-weight: bold;
      margin-bottom: 20px;
    }

    a.button {
      display: block;
      margin: 10px auto;
      padding: 12px 20px;
      background-color: #C0C0C0;
      color: #000;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      width: 80%;
      max-width: 300px;
      transition: background 0.3s;
    }
    a.button:hover { background-color: #A9A9A9; }

    /* Player de música */
    .music-player {
      background-color: #111;
      border-radius: 12px;
      padding: 20px;
      margin: 30px auto;
      max-width: 600px;
      text-align: center;
      box-shadow: 0 4px 12px rgba(255,255,255,0.1);
    }
    .music-player img.cover {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 15px;
    }
    .music-player h2 {
      margin: 10px 0;
      color: #C0C0C0;
    }
    .music-player p {
      margin: 5px 0 15px;
      color: #aaa;
    }
    .music-player audio {
      width: 100%;
      margin: 15px 0;
    }
    .btn-single {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 20px;
      background-color: #ff90e8;
      color: #000;
      font-weight: bold;
      text-decoration: none;
      border-radius: 8px;
    }

    /* Botão WhatsApp fixo */
    .whatsapp-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: #25D366;
      color: white;
      border-radius: 50px;
      padding: 12px 20px;
      font-size: 16px;
      text-decoration: none;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      z-index: 1000;
    }
