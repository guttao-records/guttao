    h1.guttao-title {

      text-shadow: 2px 2px 8px #000;
      margin: 0;
    }

      h1.guttao-title {
        font-size: 16vw; /* aumenta proporcionalmente em celulares */

      }

    .corda-frame {
      padding: 10px;
      border: 20px solid transparent;

      width: 150px;
      height: 150px;
      border-radius: 50%;

    a.button:hover { background-color: #A9A9A9; }

      width: 50px;
