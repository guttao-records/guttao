<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GUTTAO</title>
  <link rel="icon" type="image/png" href="https://i.imgur.com/fExzzXG.png">
  <style>
    body {
      margin: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #000;
      color: #C8C0C8;
      text-align: center;
      padding: 40px 20px;
    }
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px; /* espaço uniforme entre os elementos */
    }
    h1.guttao-title {
      font-size: 200px;   /* título bem grande */
      font-weight: bold;
      color: #fff;
      -webkit-text-stroke: 4px #000;
      text-shadow: 4px 4px 12px #000;
      margin: 0; /* remove margem extra */
    }
    .corda-frame {
      padding: 20px;
      border: 30px solid transparent;
      border-image: url('corda.png') 30 round;
      border-radius: 50%;
    }
    .corda-frame img {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
    }
    .card {
      background-color: #000;
      border: 1px solid #C0C0C0;
      border-radius: 12px;
      padding: 20px;
      max-width: 500px;
      box-shadow: 0 4px 12px rgba(192,192,192,0.2);
    }
    a.button {
      display: block;
      margin: 10px auto;
      padding: 12px 20px;
      background-color: #C0C0C0;
      color: #000;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      max-width: 300px;
    }
    a.button:hover { background-color: #A9A9A9; }
    .whatsapp-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      z-index: 1000;
    }
    .whatsapp-btn img {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Título principal -->
    <h1 class="guttao-title">GUTTAO</h1>

    <!-- Foto circular com moldura -->
    <div class="corda-frame">
      <img src="https://i.imgur.com/QLgvTsC.png" alt="Foto circular do Guttao">
    </div>

    <!-- Links sociais -->
    <div class="card">
      <a href="https://www.linkedin.com/in/gutoramosfernandes/" class="button">LINKEDIN</a> 
      <a href="https://www.tiktok.com/@guttaomusic" class="button" target="_blank">TIKTOK</a>
      <a href="https://www.facebook.com/guttaomusic/" class="button" target="_blank">FACEBOOK</a>
      <a href="https://www.youtube.com/@Guttaomusic" class="button" target="_blank">YOUTUBE</a>
      <a href="https://open.spotify.com/artist/0NDTkAG2eBpLyDdYmYJu1s" class="button" target="_blank">SPOTIFY</a>
      <a href="mailto:guttaostarmaker@gmail.com" class="button">GMAIL</a>  
    </div>
  </div>

  <!-- Botão WhatsApp -->
  <a href="https://wa.me/5541995721834" target="_blank" class="whatsapp-btn">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" />
  </a>

  <!-- Seção de músicas -->
  <h1>MÚSICAS:</h1>
  <iframe width="640" height="360" 
    src="https://www.youtube.com/embed/videoseries?list=PLAwMNaah2is3xRG2p1bKp8U7eu_xy6D7r&autoplay=1&loop=1" 
    frameborder="0" allow="accelerometer; autoplay; clipboard-write; 
    encrypted-media; gyroscope; picture-in-picture" allowfullscreen>
  </iframe>

  <!-- Players de áudio -->
  <h2>Meu filho e minha filha</h2>
  <audio controls>
    <source src="Meu filho e minha filha.mp3" type="audio/mpeg">
    Seu navegador não suporta o elemento de áudio.
  </audio>

  <h2>Celeiro de sonhador</h2>
  <audio controls>
    <source src="Guto Ramos Fernandes - CELEIRO DE SONHADOR - Remasterizada.m4a" type="audio/mpeg">
    Seu navegador não suporta o elemento de áudio.
  </audio>

  <p>___________________________________________</p>
  <p>Guttao 2026</p>
</body>
</html>
