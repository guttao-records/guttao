  .anel {
    width: 420px;
    height: 420px;

    position: relative;

  .lpzao {
    width: 500px;
    height: 500px;
    border-radius: 50%;
    overflow: hidden;
    animation: girar 10s linear infinite;
    box-shadow: inset 0 0 30px rgba(255,255,255,0.2);
    position: relative;
  }
  .lpzao img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    filter: brightness(1.2) contrast(1.1) saturate(1.2);
  }
  .selo {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 120px;
    height: 120px;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    background: red;
    color: white;
    font-family: Arial, sans-serif;
    font-size: 24px;
    font-weight: bold;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
  }
  audio {
    width: 400px;
    border-radius: 42px;
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
  }
  @keyframes girar {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
</style>
</head>
